<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="sanpham.js"></script>
    <script src="giohang.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      img {
        width: 100%;
      }
      .giohang {
        border: 1px solid #ddd;
        box-shadow: 2px 2px 4px #ddd;
        padding: 20px;
        margin: auto;
        max-width: 1100px;
      }

      .item-gio-hang {
        display: flex;
        flex-direction: row;
        align-items: center;
      }

      .item-gio-hang .hinh-anh img {
        width: 60px;
        height: 60px;
      }

      .item-gio-hang .hinh-anh,
      .soLuong,
      .tongTien,
      .hanhDong {
        flex: 1;
        margin-left: 20px;
      }

      .item-gio-hang .gia {
        flex: 2;
      }

      .item-gio-hang .ten {
        flex: 3;
      }
    </style>
  </head>
  <body>
    <div class="giohang" id="gio-hang"></div>
  </body>
  <script>
    hienThiDanhSachItemGioHang();

    function hienThiDanhSachItemGioHang() {
      var danhSachItemGioHang = layDanhSachItemGioHang();

      var HTML = chuyenDanhSachItemGioHangSangHTML(danhSachItemGioHang);

      var nodeGioHang = document.getElementById("gio-hang");
      nodeGioHang.innerHTML = HTML;
    }

    // Chuyển 1 danh sách thành html
    function chuyenDanhSachItemGioHangSangHTML(danhSachItemGioHang) {
      var htmlTong = "";
      for (var i = 0; i < danhSachItemGioHang.length; i++) {
        htmlTong =
          htmlTong + chuyenDoiTuongItemGioHangSangHTML(danhSachItemGioHang[i]);
      }
      return htmlTong;
    }

    function chuyenDoiTuongItemGioHangSangHTML(itemGioHang) {
      var sanPham = truyXuatSanPhamTheoID(itemGioHang.idSanPham);

      console.log(sanPham);

      var tongTien = itemGioHang.soLuong * sanPham.Gia;

      var html =
        '<div class="giohang">\n' +
        '      <div class="item-gio-hang">\n' +
        '        <div class="hinh-anh">\n' +
        '          <img src="' +
        sanPham.hinhAnh +
        '" alt="" />\n' +
        "          </div>\n" +
        '          <p class="ten">' +
        sanPham.Ten +
        "</p>\n" +
        '          <div class="gia">\n' +
        '            <span class="giaban">' +
        sanPham.Gia +
        "</span>\n" +
        "          </div>\n" +
        '          <input type="number" class="soLuong" value="' +
        itemGioHang.soLuong +
        '" />\n' +
        '          <p class="tongTien">' +
        tongTien +
        "</p>\n" +
        "\n" +
        '          <div class="hanhDong">\n' +
        "            <button>xóa</button>\n" +
        "          </div>\n" +
        "        </div>\n" +
        "      </div>\n" +
        "    </div>";
      return html;
    }
  </script>
</html>
